version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - '3000'

  mdns:
    image: debian:bookworm-slim
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq avahi-daemon avahi-utils dbus &&
        mkdir -p /var/run/dbus &&
        dbus-daemon --system --fork &&
        sed -i 's/#allow-interfaces=eth0/allow-interfaces=eth0,wlan0/' /etc/avahi/avahi-daemon.conf &&
        avahi-daemon --no-drop-root
      "

volumes:
  redis_data:
